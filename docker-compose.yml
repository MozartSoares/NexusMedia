services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusmedia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-johndoe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-randompassword}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: nexusmedia-minio
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    container_name: nexusmedia-minio-setup
    depends_on:
      - minio
    environment:
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-nexusmedia-content}
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 $${STORAGE_ACCESS_KEY} $${STORAGE_SECRET_KEY}) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/$${STORAGE_BUCKET_NAME} --ignore-existing;
      /usr/bin/mc anonymous set public myminio/$${STORAGE_BUCKET_NAME};
      echo 'MinIO setup complete';
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
